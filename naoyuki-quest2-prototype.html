<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>直幸QUEST2 〜南の新大陸と光の絆〜（試作版）</title>
<style>
:root{
  --bg:#0a0e1a; --panel:#141b2e; --panel2:#1c2540;
  --border:#2a3a5c; --text:#e8eef8; --sub:#8fa3c8;
  --gold:#ffd166; --fire:#ff6b35; --water:#4cc9f0; --light:#a7f3d0;
  --hp:#4ade80; --hpBad:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN',sans-serif;overflow-x:hidden;}
#app{max-width:820px;margin:0 auto;padding:0 12px 80px;}

/* ── 3D canvas ── */
#bg3d{position:fixed;inset:0;z-index:0;}
#app,#tabbar{position:relative;z-index:1;}

/* ── header ── */
.hero-header{text-align:center;padding:18px 0 6px;}
.hero-header h1{
  font-size:26px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--fire),var(--water));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,209,102,.35));
}
.hero-header .sub{color:var(--sub);font-size:12px;margin-top:4px;}
.proto-badge{display:inline-block;margin-top:6px;font-size:11px;color:var(--bg);background:var(--gold);border-radius:999px;padding:2px 10px;font-weight:bold;}

/* ── panels ── */
.panel{background:rgba(20,27,46,.88);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:14px;backdrop-filter:blur(6px);}
.panel h2{font-size:16px;color:var(--gold);margin-bottom:10px;}
.stats-row{display:flex;gap:10px;margin-top:14px;}
.stat{flex:1;background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:10px;text-align:center;}
.stat .v{font-size:22px;font-weight:bold;color:var(--gold);}
.stat .l{font-size:11px;color:var(--sub);margin-top:2px;}

/* ── duo bond gauge ── */
.bond-wrap{margin-top:8px;}
.bond-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:4px;}
.bond-bar{height:14px;background:#0d1322;border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.bond-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--water),var(--light),var(--gold));transition:width .6s ease;}

/* ── tasks ── */
.task{display:flex;align-items:center;gap:12px;background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:8px;cursor:pointer;transition:transform .1s;}
.task:active{transform:scale(.98);}
.task.done{opacity:.55;border-color:var(--hp);}
.task .check{width:26px;height:26px;border-radius:8px;border:2px solid var(--sub);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.task.done .check{background:var(--hp);border-color:var(--hp);color:#06281a;}
.task .name{flex:1;font-size:15px;}
.task .pt{color:var(--gold);font-weight:bold;font-size:14px;}

/* ── battle (2D ATB / FF6風) ── */
.btl-screen{position:relative;width:100%;aspect-ratio:16/11;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#000;}
.btl-bg{position:absolute;inset:0;background:url('images/chapter2.png') center/cover;filter:brightness(.32) saturate(.9) blur(1.5px);transform:scale(1.04);}
.btl-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,transparent 35%,rgba(0,0,10,.7));}
#foeGlow{position:absolute;left:-2%;top:8%;width:56%;aspect-ratio:1;background:radial-gradient(circle,rgba(165,185,235,.55),rgba(120,140,200,.25) 45%,transparent 68%);}
#foeSpr{position:absolute;left:6%;top:22%;width:38%;max-width:250px;mix-blend-mode:multiply;filter:contrast(1.1);animation:foeIdle 3s ease-in-out infinite;transition:opacity .8s,transform .25s;}
@keyframes foeIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#foeSpr.foe-fwd{animation:none;transform:translateX(46px) scale(1.06);}
#foeSpr.flash{animation:foeFlash .3s;}
@keyframes foeFlash{0%,100%{filter:drop-shadow(0 14px 20px rgba(0,0,0,.7))}50%{filter:brightness(2.4) saturate(.3) drop-shadow(0 0 18px #fff)}}
.hero-spr{position:absolute;width:16%;max-width:92px;aspect-ratio:4/5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:linear-gradient(160deg,rgba(40,50,82,.92),rgba(16,22,42,.92));border:2px solid var(--border);border-radius:12px;transition:transform .2s,border-color .2s,box-shadow .2s;}
.hero-spr.empty{opacity:.45;border-style:dashed;}
.hero-spr.active{border-color:var(--gold);box-shadow:0 0 16px rgba(255,209,102,.55);}
.hero-spr.atk-fwd{transform:translateX(-30px) scale(1.08);}
.hero-spr .em{font-size:32px;}
.hero-spr .nm{font-size:10px;color:var(--sub);}
.dmg{position:absolute;font-weight:bold;font-size:24px;text-shadow:0 2px 6px #000,0 0 10px rgba(0,0,0,.8);animation:dmgUp .9s forwards;pointer-events:none;z-index:5;}
@keyframes dmgUp{0%{transform:translateY(0);opacity:1}75%{opacity:1}100%{transform:translateY(-48px);opacity:0}}
.btl-screen.shake{animation:scrShake .4s;}
@keyframes scrShake{0%,100%{transform:translate(0)}20%{transform:translate(-8px,4px)}40%{transform:translate(7px,-5px)}60%{transform:translate(-5px,3px)}80%{transform:translate(4px,-2px)}}
.cutin{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:28px;font-weight:bold;color:#fff;letter-spacing:5px;padding:12px 0;z-index:6;text-shadow:0 0 18px rgba(255,209,102,.9),0 3px 8px #000;background:linear-gradient(90deg,transparent,rgba(0,0,24,.8),transparent);animation:cutinAnim 1.1s forwards;}
@keyframes cutinAnim{0%{transform:scaleX(.15);opacity:0}15%{transform:scaleX(1);opacity:1}80%{opacity:1}100%{opacity:0}}
/* FF6風コマンドウィンドウ */
.ff-window{margin-top:10px;border-radius:10px;border:2px solid #8fa3c8;background:linear-gradient(180deg,#1a2c5e,#0d1733);box-shadow:inset 0 0 0 2px #0a1126,0 4px 14px rgba(0,0,0,.5);padding:10px;}
.party-rows{display:grid;gap:6px;}
.prow{display:grid;grid-template-columns:1fr 56px 44px 84px;align-items:center;gap:8px;font-size:13px;}
.prow .pn{color:#fff;white-space:nowrap;overflow:hidden;}
.prow.dead .pn{color:var(--hpBad);text-decoration:line-through;}
.prow .hp{color:var(--hp);text-align:right;}
.prow .mp{color:#9bb6ff;text-align:right;}
.atb{height:11px;border:1px solid #44598c;border-radius:99px;overflow:hidden;background:#0a1126;}
.atb i{display:block;height:100%;background:linear-gradient(90deg,#4cc9f0,#ffd166);}
.atb.full i{background:#ffd166;box-shadow:0 0 8px #ffd166;}
.cmds{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cmd{flex:1;min-width:84px;padding:12px 4px;border-radius:10px;border:1px solid #44598c;background:#16224a;color:#fff;font-family:inherit;font-size:13px;font-weight:bold;cursor:pointer;}
.cmd:active{background:#233a6e;}
.cmd.limit{flex-basis:100%;background:linear-gradient(135deg,#ff6b35,#ffd166);color:#231200;border:none;animation:limitPulse 1s infinite;}
@keyframes limitPulse{0%,100%{box-shadow:0 0 6px rgba(255,107,53,.5)}50%{box-shadow:0 0 20px rgba(255,209,102,.95)}}
#muteBtn{position:fixed;right:14px;top:14px;z-index:10;background:rgba(20,27,46,.85);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:6px 10px;cursor:pointer;}
.submenu{margin-top:8px;display:grid;gap:6px;}
.subitem{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid #44598c;border-radius:10px;background:#101a3a;color:#fff;font-size:13px;cursor:pointer;}
.subitem.dis{opacity:.4;cursor:default;}
#btlMsg{min-height:22px;margin-top:10px;font-size:13px;color:var(--text);line-height:1.7;}

/* ── story ── */
.scene{background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px;font-size:14px;line-height:1.9;}
.scene.locked{opacity:.45;}
.scene .pt-tag{font-size:11px;color:var(--gold);margin-bottom:6px;}
.scene .speaker-rai{color:var(--water);font-weight:bold;}
.scene .speaker-nao{color:var(--gold);font-weight:bold;}

/* ── tabs ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(10,14,26,.95);border-top:1px solid var(--border);backdrop-filter:blur(10px);}
.tab{flex:1;border:none;background:none;color:var(--sub);font-size:12px;padding:10px 0 14px;cursor:pointer;font-family:inherit;}
.tab.active{color:var(--gold);}
.tab .ic{font-size:20px;display:block;margin-bottom:2px;}
.view{display:none;}
.view.active{display:block;}
</style>
</head>
<body>
<canvas id="bg3d"></canvas>
<button id="muteBtn" onclick="toggleMute()">🔊</button>
<div id="app">
  <div class="hero-header">
    <h1>直幸QUEST2</h1>
    <div class="sub">〜南の新大陸と光の絆〜</div>
    <div class="proto-badge">試作版 ver 0.1</div>
  </div>

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="stats-row">
      <div class="stat"><div class="v" id="stTotal">0</div><div class="l">累積ポイント</div></div>
      <div class="stat"><div class="v" id="stToday">0</div><div class="l">今日のポイント</div></div>
      <div class="stat"><div class="v" id="stStreak">0</div><div class="l">連続日数</div></div>
    </div>
    <div class="panel">
      <h2>🤝 ナオ＆ライ 絆ゲージ</h2>
      <div class="bond-wrap">
        <div class="bond-label"><span>二人の絆</span><span id="bondPct">0%</span></div>
        <div class="bond-bar"><div class="bond-fill" id="bondFill" style="width:0%"></div></div>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:8px;line-height:1.7;">
        クエストをこなすたびに絆が深まる。絆ゲージが満タンになると、バトルで<b style="color:var(--gold)">合体必殺技「ダブル・ライト」</b>が使えるようになる！
      </div>
    </div>
    <div class="panel">
      <h2>📋 今日のクエスト</h2>
      <div id="taskList"></div>
    </div>
  </div>

  <!-- BATTLE -->
  <div class="view" id="view-battle">
    <div class="panel">
      <h2 id="btlTitle">⚔️ バトル</h2>
      <div class="btl-screen" id="btlScreen">
        <div class="btl-bg"></div>
        <div class="btl-vignette"></div>
        <div id="foeGlow"></div>
        <img id="foeSpr" src="images/shadowwolf.PNG" alt="シャドウ・ウルフ">
        <div id="heroSprs"></div>
      </div>
      <div class="ff-window">
        <div class="party-rows" id="partyRows"></div>
        <div id="cmdArea"></div>
        <div id="btlMsg">ATBゲージが溜まったら行動できる！</div>
      </div>
    </div>
  </div>

  <!-- STORY -->
  <div class="view" id="view-story">
    <div class="panel">
      <h2>📖 第1章「二人の船出」</h2>
      <div id="storyList"></div>
    </div>
  </div>
</div>

<div id="tabbar">
  <button class="tab active" data-v="home" onclick="go('home')"><span class="ic">🏠</span>ホーム</button>
  <button class="tab" data-v="battle" onclick="go('battle')"><span class="ic">⚔️</span>バトル</button>
  <button class="tab" data-v="story" onclick="go('story')"><span class="ic">📖</span>ストーリー</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
'use strict';
/* =====================================================
   直幸QUEST2 試作版
   - localStorage key: naoyuki_quest2_proto（本編とは別キー）
   - 3D: Three.js r160（CDN）
   ===================================================== */

// ── タスク（本編と同じ9つ） ──
const TASKS = [
  {id:'wake',   name:'朝６時までに起きる', pt:5},
  {id:'mteeth', name:'朝のはみがき',       pt:5},
  {id:'dish',   name:'食洗機の食器を片付ける', pt:5},
  {id:'zkai',   name:'Z会',               pt:40},
  {id:'hw',     name:'宿題',              pt:20},
  {id:'piano',  name:'ピアノ',            pt:5},
  {id:'bath',   name:'お風呂',            pt:5},
  {id:'nteeth', name:'夜のはみがき',       pt:5},
  {id:'duo',    name:'デュオリンゴ',       pt:10},
];

// ── シーズン2 第1章（試作：5シーン） ──
const STORY = [
  {pt:0, text:'ハジマリ村の港。大きな白い帆船の前に、ナオとライが並んで立っていた。<span class="speaker-rai">ライ</span>「本当に、俺も行っていいのか」<span class="speaker-nao">ナオ</span>「当たり前だろ。約束したじゃないか。一緒に、また始めようって」ライは新しいクエストの書を胸に抱えた。真っ白なページの一番上に、今日の日付と最初のクエストが書き込まれていた。百年ぶりの、一行目だった。'},
  {pt:30, text:'船が南へ進む。ライは船べりで、慣れない手つきでクエストの書をつけていた。<span class="speaker-rai">ライ</span>「……たった一行書くだけなのに、手が震える」<span class="speaker-nao">ナオ</span>「最初はみんなそうだよ。でも明日も書けば、震えなくなる」ライは笑った。百年間忘れていた、続けることの怖さと、嬉しさを思い出しながら。'},
  {pt:70, text:'三日目の朝、ライが誰よりも早く甲板に出ていた。朝日に向かって、剣の素振りをしている。<span class="speaker-nao">ナオ</span>「早いね」<span class="speaker-rai">ライ</span>「三日続いた。たった三日だ。でも、百年で一番誇らしい三日だ」その目には、かつてのヤミノ王の影はもうなかった。ナオは隣に並び、一緒に剣を振った。'},
  {pt:120, text:'突然、海が割れた。巨大な水の巨人「荒波のガーディアン」が船の行く手を塞いだ。「新大陸に渡りたくば、二人の絆を見せてみよ」ナオが剣を抜き、ライが光の魔法を構えた。二人が背中合わせに立つ。<span class="speaker-nao">ナオ</span>「ライ、合わせられるか」<span class="speaker-rai">ライ</span>「ああ。お前となら」初めての、二人での戦いが始まった。'},
  {pt:180, text:'ナオの剣撃とライの光魔法が重なった瞬間、二つの光が螺旋を描いて一つになった。合体技「ダブル・ライト」。荒波のガーディアンは光に貫かれ、静かに頭を垂れた。「見事な絆だ。通るがよい」海が開き、水平線の向こうに緑の大陸が見えた。<span class="speaker-rai">ライ</span>「あれが、南の新大陸……」二人の新しい冒険が、いま本当に始まる。第1章・完。'},
];

// ── 状態 ──
const KEY='naoyuki_quest2_proto';
function load(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function today(){const d=new Date(Date.now()+9*36e5);return d.toISOString().split('T')[0];}
let state = load() || {total:0, history:{}, streak:0, lastDay:null};

// ── レンダリング ──
function todayDone(){return state.history[today()]||[];}
function todayPt(){return todayDone().reduce((a,id)=>{const t=TASKS.find(t=>t.id===id);return a+(t?t.pt:0);},0);}
function bondPct(){return Math.min(100, Math.round(todayDone().length/TASKS.length*100));}

function render(){
  document.getElementById('stTotal').textContent=state.total;
  document.getElementById('stToday').textContent=todayPt();
  document.getElementById('stStreak').textContent=state.streak;
  const pct=bondPct();
  document.getElementById('bondFill').style.width=pct+'%';
  document.getElementById('bondPct').textContent=pct+'%';

  const list=document.getElementById('taskList');
  list.innerHTML='';
  const done=todayDone();
  TASKS.forEach(t=>{
    const d=done.includes(t.id);
    const el=document.createElement('div');
    el.className='task'+(d?' done':'');
    el.innerHTML=`<div class="check">${d?'✓':''}</div><div class="name">${t.name}</div><div class="pt">+${t.pt}P</div>`;
    el.onclick=()=>toggle(t.id);
    list.appendChild(el);
  });

  const sl=document.getElementById('storyList');
  sl.innerHTML='';
  STORY.forEach(sc=>{
    const open=state.total>=sc.pt;
    const el=document.createElement('div');
    el.className='scene'+(open?'':' locked');
    el.innerHTML=`<div class="pt-tag">${sc.pt}P で解放</div>${open?sc.text:'🔒 クエストを続けると読めるようになる'}`;
    sl.appendChild(el);
  });
}

function toggle(id){
  const d=today();
  if(!state.history[d]) state.history[d]=[];
  const arr=state.history[d];
  const t=TASKS.find(t=>t.id===id);
  const i=arr.indexOf(id);
  if(i>=0){arr.splice(i,1); state.total-=t.pt;}
  else{
    arr.push(id); state.total+=t.pt;
    if(state.lastDay!==d){
      const y=new Date(Date.now()+9*36e5-864e5).toISOString().split('T')[0];
      state.streak=(state.lastDay===y)?state.streak+1:1;
      state.lastDay=d;
    }
  }
  save(); render();
}

function go(v){
  currentView=v;
  if(AU.ctx&&!state.muted){
    const want=(v==='battle'&&B&&!B.over)||v==='battle'?'battle':'home';
    if(AU.bgmName!==want) playBgm(want);
  }
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`.tab[data-v="${v}"]`).classList.add('active');
  if(v==='battle') initBattle();
}

/* =====================================================
   3D 背景（タイトル：海と新大陸の島）
   ===================================================== */
let bgRenderer, bgScene, bgCam, island, ocean, stars=[];
function initBg3D(){
  const cv=document.getElementById('bg3d');
  bgRenderer=new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:false});
  bgRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  bgScene=new THREE.Scene();
  bgScene.fog=new THREE.Fog(0x0a0e1a, 18, 60);
  bgScene.background=new THREE.Color(0x0a0e1a);
  bgCam=new THREE.PerspectiveCamera(55, innerWidth/innerHeight, .1, 100);
  bgCam.position.set(0, 3.5, 13);
  bgCam.lookAt(0, 1, 0);

  bgScene.add(new THREE.AmbientLight(0x334466, 1.2));
  const moon=new THREE.DirectionalLight(0xaac8ff, 1.4);
  moon.position.set(-6, 10, 4); bgScene.add(moon);
  const warm=new THREE.PointLight(0xffd166, 2.5, 30);
  warm.position.set(2, 4, 2); bgScene.add(warm);

  // 海（揺れる平面）
  const og=new THREE.PlaneGeometry(80, 80, 48, 48);
  ocean=new THREE.Mesh(og, new THREE.MeshStandardMaterial({color:0x12305a, metalness:.6, roughness:.4, flatShading:true}));
  ocean.rotation.x=-Math.PI/2; bgScene.add(ocean);

  // 新大陸の島（ローポリ円錐群）
  island=new THREE.Group();
  const mk=(geo,col,x,y,z,s)=>{const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:col,flatShading:true}));m.position.set(x,y,z);m.scale.setScalar(s);island.add(m);return m;};
  mk(new THREE.ConeGeometry(2.2,3,7), 0x2d6a4f, 0, 1.4, 0, 1);          // 山
  mk(new THREE.ConeGeometry(1.4,2,6), 0x40916c, -2.1, .9, .8, 1);       // 丘
  mk(new THREE.ConeGeometry(1.1,1.6,6), 0x40916c, 1.9, .7, -.6, 1);     // 丘
  mk(new THREE.ConeGeometry(.55,1.5,5), 0xffd166, 0, 3.6, 0, 1);        // 光の山頂
  mk(new THREE.CylinderGeometry(3.2,3.6,.8,9), 0xc2a86b, 0, .1, 0, 1);  // 砂浜
  island.position.set(0, .2, -4);
  bgScene.add(island);

  // 星
  const sg=new THREE.SphereGeometry(.05,4,4);
  const sm=new THREE.MeshBasicMaterial({color:0xffffff});
  for(let i=0;i<120;i++){
    const st=new THREE.Mesh(sg,sm);
    st.position.set((Math.random()-.5)*70, 6+Math.random()*22, -10-Math.random()*40);
    stars.push(st); bgScene.add(st);
  }
  resizeBg(); animateBg();
}
function resizeBg(){
  bgRenderer.setSize(innerWidth, innerHeight);
  bgCam.aspect=innerWidth/innerHeight; bgCam.updateProjectionMatrix();
}
let bgT=0;
function animateBg(){
  requestAnimationFrame(animateBg);
  bgT+=.012;
  // 波
  const pos=ocean.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i);
    pos.setZ(i, Math.sin(x*.5+bgT)*.25 + Math.cos(y*.4+bgT*.8)*.2);
  }
  pos.needsUpdate=true;
  island.rotation.y+=.0015;
  island.position.y=.2+Math.sin(bgT*.5)*.08;
  bgRenderer.render(bgScene, bgCam);
}

/* =====================================================
   2D ATBバトル（FF6風）
   - ATBゲージが溜まったらコマンド選択
   - レベル・技・アイテムは累積ポイントと連動
   ===================================================== */
// レベル：累積ポイントから自動計算（クエストを続けるほど強くなる）
function heroLv(){ return Math.max(1, Math.min(50, 1+Math.floor(Math.sqrt(state.total/25)))); }

// 技・魔法（unlockPt の累積ポイントに達すると習得）
const SKILLS={
  nao:[

    {id:'rekka',  name:'れっかざん',       mp:8,  unlockPt:500,  pow:2.3, type:'phys', desc:'炎をまとった三連斬り'},
    {id:'hikari', name:'ひかりのつるぎ',   mp:14, unlockPt:1500, pow:3.2, type:'phys', desc:'光の力を剣に集めて放つ'},
  ],
  rai:[
    {id:'shine',  name:'シャイン',         mp:5,  unlockPt:0,    pow:1.8, type:'mag',  desc:'光の弾を放つ'},
    {id:'heal',   name:'ヒール',           mp:6,  unlockPt:300,  pow:0,   type:'heal', desc:'いちばん弱った仲間のHPを回復'},
    {id:'burst',  name:'シャインバースト', mp:12, unlockPt:1000, pow:2.6, type:'mag',  desc:'まばゆい光の大爆発'},
  ],
};

// アイテム：累積ポイントに応じて自動支給
const ITEM_DEFS=[
  {id:'potion', name:'ポーション', every:100,  desc:'HPを50%回復'},
  {id:'ether',  name:'エーテル',   every:300,  desc:'MPを50%回復'},
  {id:'elixir', name:'エリクサー', every:1000, desc:'HPとMPを全回復'},
];
function grantItems(){
  if(!state.inv) state.inv={};
  if(!state.granted) state.granted={};
  const got=[];
  ITEM_DEFS.forEach(d=>{
    const due=Math.floor(state.total/d.every);
    const had=state.granted[d.id]||0;
    if(due>had){
      state.inv[d.id]=(state.inv[d.id]||0)+(due-had);
      got.push(`${d.name}×${due-had}`);
      state.granted[d.id]=due;
    }
  });
  if(got.length) save();
  return got;
}

const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* =====================================================
   サウンド（Web Audio：ファイル不要のチップチューン）
   ===================================================== */
let currentView='home';
const AU={ctx:null, bgmName:null, bgmTimer:null, step:0};
function aReady(){ return AU.ctx && !state.muted; }
function aInit(){
  if(!AU.ctx){
    try{ AU.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  }
  if(AU.ctx.state==='suspended') AU.ctx.resume();
  if(!AU.bgmName) playBgm(currentView==='battle'?'battle':'home');
}
document.addEventListener('pointerdown', aInit);

// 単音（type=波形, slideTo=音程スライド）
function tone(f, start, dur, type, vol, slideTo){
  if(!aReady()) return;
  const c=AU.ctx, o=c.createOscillator(), g=c.createGain(), t0=c.currentTime+start;
  o.type=type||'square';
  o.frequency.setValueAtTime(f, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30,slideTo), t0+dur);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol??.12, t0+.01);
  g.gain.exponentialRampToValueAtTime(.001, t0+dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0+dur+.05);
}
// ノイズ（打撃音・ハイハット用）
function noiseHit(start, dur, vol, cutoff){
  if(!aReady()) return;
  const c=AU.ctx, t0=c.currentTime+start;
  const buf=c.createBuffer(1, Math.max(1,c.sampleRate*dur), c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const n=c.createBufferSource(); n.buffer=buf;
  const f=c.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cutoff||1000;
  const g=c.createGain();
  g.gain.setValueAtTime(vol??.15, t0);
  g.gain.exponentialRampToValueAtTime(.001, t0+dur);
  n.connect(f); f.connect(g); g.connect(c.destination);
  n.start(t0);
}
// 効果音いろいろ
const SFX={
  attack(){ noiseHit(0,.12,.18,2500); tone(180,.05,.12,'square',.15,60); },
  hit(){ noiseHit(0,.18,.2,600); tone(110,0,.18,'sawtooth',.14,50); },
  heal(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.08,.2,'sine',.11)); },
  ready(){ tone(880,0,.08,'square',.06); tone(1320,.08,.1,'square',.06); },
  cutin(){ tone(220,0,.4,'sawtooth',.11,880); noiseHit(.05,.3,.07,1200); },
  limit(){ tone(110,0,.5,'sawtooth',.15,440); tone(220,.2,.5,'square',.11,880); noiseHit(.3,.4,.11,3000); },
  item(){ tone(988,0,.07,'square',.1); tone(1319,.07,.15,'square',.1); },
  tick(){ tone(660,0,.05,'square',.05); },
  win(){
    [[523,0],[523,.15],[523,.3],[659,.45],[784,.75],[659,1.0],[784,1.3]].forEach(([f,t])=>tone(f,t,.25,'square',.11));
    [262,330,392].forEach(f=>tone(f,1.3,.7,'triangle',.07));
  },
  lose(){ [392,349,311,262].forEach((f,i)=>tone(f,i*.3,.35,'triangle',.1)); },
};
// BGM（ループ：battle=緊迫の戦闘曲 / home=穏やかな冒険曲）
const BGM_SONGS={
  battle:{bpm:160,
    bass:[110,110,82.4,82.4,87.3,87.3,98,98],
    lead:[440,523,659,587,523,587,659,784,440,523,659,880,784,659,587,523]},
  home:{bpm:84,
    bass:[130.8,98,110,98],
    lead:[262,330,392,494,392,330,294,247,262,330,392,523,494,392,330,294]},
};
function playBgm(name){
  if(AU.bgmTimer){ clearInterval(AU.bgmTimer); AU.bgmTimer=null; }
  AU.bgmName=name; AU.step=0;
  if(!name||!AU.ctx) return;
  const song=BGM_SONGS[name];
  const stepDur=60/song.bpm/2; // 8分音符
  AU.bgmTimer=setInterval(()=>{
    if(!aReady()) return;
    const s=AU.step;
    tone(song.bass[s%song.bass.length], 0, stepDur*.9, 'triangle', name==='battle'?.085:.055);
    tone(song.lead[s%song.lead.length], 0, stepDur*.85, name==='battle'?'square':'sine', name==='battle'?.05:.045);
    if(name==='battle'&&s%2===0) noiseHit(0,.03,.035,6000); // ハイハット
    AU.step++;
  }, stepDur*1000);
}
function toggleMute(){
  state.muted=!state.muted; save();
  document.getElementById('muteBtn').textContent=state.muted?'🔇':'🔊';
  if(state.muted) playBgm(null);
  else { aInit(); playBgm(currentView==='battle'?'battle':'home'); }
}

/* =====================================================
   節ごとの出現モンスター＆章ごとの戦闘背景
   ※QUEST2用の敵画像が揃うまでは「ライの幻影魔法で
     過去の強敵を再現して修行する」という設定で
     本編の画像を流用。画像が揃ったらここを差し替えるだけ。
   ===================================================== */
const ENCOUNTERS=[
  {minPt:0,    name:'シャドウ・ウルフの幻影',     img:'images/shadowwolf.PNG',   bg:'images/chapter2.png', mul:1.0},
  {minPt:120,  name:'荒波のガーディアン',         img:'images/stormking.PNG',    bg:'images/chapter3.png', mul:1.15},
  {minPt:500,  name:'鎧の巨人の幻影',             img:'images/darkguardian.PNG', bg:'images/chapter5.png', mul:1.3},
  {minPt:1000, name:'炎の番人の幻影',             img:'images/inferl.PNG',       bg:'images/chapter7.png', mul:1.45},
  {minPt:2000, name:'ヤミノ王の幻影',             img:'images/yaminoou1.png',    bg:'images/chapter7.png', mul:1.6},
  {minPt:3000, name:'ヤミノ王・最終形態の幻影',   img:'images/Yaminoou2.png',    bg:'images/chapter8.png', mul:1.8},
];
function currentEncounter(){ return [...ENCOUNTERS].reverse().find(e=>state.total>=e.minPt); }

// リミット技（HP30%以下のピンチで1戦闘1回だけ使える）
const LIMITS={
  nao:{name:'クライシスブレード', desc:'ピンチの力を剣に変える'},
  rai:{name:'ひかりのいのり',     desc:'仲間全員を大回復し、光で攻撃'},
};

// ── バトル状態 ──
let B=null, atbTimer=null;
function initBattle(){
  if(B && !B.over){ renderBattleAll(); return; } // 戦闘継続中はそのまま
  const lv=heroLv();
  const enc=currentEncounter();
  const mk=(key,name,em,hp,mp,atk,mag,spd)=>({key,name,em,lv,hp,mhp:hp,mp,mmp:mp,atk,mag,spd,atb:0,alive:true,defend:false,limitUsed:false});
  const fhp=Math.round((130+lv*22)*enc.mul);
  B={
    over:false, menuOpen:false, acting:false, turnHero:null, duoUsed:false,
    heroes:[
      mk('nao','ナオ','🗡️', 80+lv*12, 20+lv*2, 10+lv*3, 6+lv*2, 30),
      mk('rai','ライ','✨',  70+lv*10, 30+lv*4, 7+lv*2, 10+lv*3, 27),
      null, null, // なかまモンスター枠（ストーリーが進むと仲間が増える）
    ],
    foe:{name:enc.name, hp:fhp, mhp:fhp, atk:Math.round((9+lv*2)*enc.mul), spd:24, atb:20, alive:true},
  };
  B.heroes[0].atb=40;
  // 章に合わせて敵画像と戦闘背景を切り替え
  document.getElementById('foeSpr').src=enc.img;
  document.querySelector('.btl-bg').style.backgroundImage=`url('${enc.bg}')`;
  document.getElementById('btlTitle').textContent=`⚔️ バトル：${enc.name}`;
  const got=grantItems();
  renderBattleAll();
  bmsg(got.length?`📦 クエスト達成のごほうび：${got.join('、')} を手に入れた！`:`${enc.name} があらわれた！（ライの幻影魔法による修行バトル）`);
  if(AU.ctx&&!state.muted&&AU.bgmName!=='battle') playBgm('battle');
  if(!atbTimer){
    let last=performance.now();
    atbTimer=setInterval(()=>{
      const now=performance.now(), dt=now-last; last=now;
      battleTick(dt);
    },50);
  }
}

function battleTick(dt){
  if(!B||B.over||B.menuOpen||B.acting) return;  // ウェイトモード：選択中は時間停止
  B.heroes.forEach(h=>{ if(h&&h.alive&&B.turnHero!==h) h.atb=Math.min(100,h.atb+h.spd*dt*.0011); });
  if(B.foe.alive) B.foe.atb=Math.min(100,B.foe.atb+B.foe.spd*dt*.0011);
  if(!B.turnHero){
    const ready=B.heroes.find(h=>h&&h.alive&&h.atb>=100);
    if(ready){ B.turnHero=ready; openCmd(); return; }
  }
  if(B.foe.alive&&B.foe.atb>=100){ foeAct(); return; }
  renderRows();
}

// ── 画面描画 ──
function renderBattleAll(){
  const wrap=document.getElementById('heroSprs');
  wrap.innerHTML='';
  const pos=[{r:'21%',t:'14%'},{r:'4%',t:'34%'},{r:'21%',t:'54%'},{r:'4%',t:'74%'}];
  B.heroes.forEach((h,i)=>{
    const el=document.createElement('div');
    el.className='hero-spr'+(h?'':' empty');
    el.id='hero'+i;
    el.style.right=pos[i].r; el.style.top=pos[i].t;
    el.innerHTML=h?`<div class="em">${h.em}</div><div class="nm">${h.name} Lv${h.lv}</div>`
                  :`<div class="em" style="opacity:.35">❔</div><div class="nm">なかま募集中</div>`;
    wrap.appendChild(el);
  });
  document.getElementById('foeSpr').style.opacity=B.foe.alive?1:0;
  renderRows(); closeCmd();
}
function renderRows(){
  const rows=document.getElementById('partyRows');
  const fr=Math.max(0,B.foe.hp/B.foe.mhp*100);
  let html=`<div class="prow"><span class="pn">👿 ${B.foe.name}</span><span></span><span></span>
    <div class="atb"><i style="width:${fr}%;background:${fr<30?'#f87171':'#4ade80'}"></i></div></div>`;
  B.heroes.forEach(h=>{
    if(!h) return;
    html+=`<div class="prow${h.alive?'':' dead'}">
      <span class="pn">${h.em} ${h.name}</span>
      <span class="hp">${Math.max(0,Math.ceil(h.hp))}</span>
      <span class="mp">${Math.ceil(h.mp)}</span>
      <div class="atb${h.atb>=100?' full':''}"><i style="width:${h.atb}%"></i></div>
    </div>`;
  });
  rows.innerHTML=html;
}
function bmsg(t){document.getElementById('btlMsg').innerHTML=t;}

// ── コマンドメニュー ──
function openCmd(){
  B.menuOpen=true;
  SFX.ready();
  const idx=B.heroes.indexOf(B.turnHero);
  const el=document.getElementById('hero'+idx);
  if(el) el.classList.add('active');
  cmdMain();
}
function cmdMain(){
  const h=B.turnHero;
  // HP30%以下のピンチで、まだ使っていなければリミット技が解放
  const limitReady=h.hp/h.mhp<=.3&&!h.limitUsed;
  document.getElementById('cmdArea').innerHTML=`
    <div style="font-size:13px;color:#ffd166;margin-top:8px;">▶ ${h.name} のターン！</div>
    <div class="cmds">
      <button class="cmd" onclick="doAttack()">⚔️ たたかう</button>
      <button class="cmd" onclick="cmdSkills()">${h.key==='nao'?'💥 とくぎ':'🔮 まほう'}</button>
      <button class="cmd" onclick="cmdItems()">🎒 アイテム</button>
      <button class="cmd" onclick="doDefend()">🛡️ ぼうぎょ</button>
      ${limitReady?`<button class="cmd limit" onclick="useLimit()">⚡ リミット技：${LIMITS[h.key].name}</button>`:''}
    </div>`;
}
async function useLimit(){
  const h=B.turnHero, idx=B.heroes.indexOf(h);
  B.menuOpen=false; B.acting=true; closeCmd();
  h.limitUsed=true;
  SFX.limit();
  fxCutin('⚡ '+LIMITS[h.key].name+' ⚡','#ff9d5c');
  await wait(900);
  if(h.key==='nao'){
    fxLunge(idx); await wait(220);
    dealToFoe(h.atk*6, '⚡ クライシスブレード！ ピンチの力が爆発した！');
  }else{
    B.heroes.forEach(x=>{
      if(x&&x.alive){
        const amt=Math.round(x.mhp*.6);
        x.hp=Math.min(x.mhp,x.hp+amt);
        popDmg('hero'+B.heroes.indexOf(x),'+'+amt,'#4ade80');
      }
    });
    SFX.heal();
    await wait(400);
    dealToFoe(h.mag*3, '✨ ひかりのいのり！ 祈りの光が敵を貫いた！');
  }
  await wait(650);
  B.acting=false; endTurn();
}
function cmdSkills(){
  SFX.tick();
  const h=B.turnHero;
  const list=SKILLS[h.key].filter(s=>state.total>=s.unlockPt);
  const locked=SKILLS[h.key].filter(s=>state.total<s.unlockPt);
  let html='<div class="submenu">';
  list.forEach(s=>{
    const ok=h.mp>=s.mp;
    html+=`<div class="subitem${ok?'':' dis'}" ${ok?`onclick="useSkill('${s.id}')"`:''}>
      <span>${s.name}<small style="color:#8fa3c8;margin-left:8px">${s.desc}</small></span><span style="color:#9bb6ff">MP${s.mp}</span></div>`;
  });
  if(h.key==='nao'&&bondPct()===100&&!B.duoUsed&&B.heroes[1].alive){
    html+=`<div class="subitem" style="border-color:#ffd166" onclick="useSkill('duo')">
      <span>✨ダブル・ライト<small style="color:#8fa3c8;margin-left:8px">二人の絆の合体技（1戦闘1回）</small></span><span style="color:#ffd166">絆MAX</span></div>`;
  }
  locked.forEach(s=>{
    html+=`<div class="subitem dis"><span>❓ ？？？</span><span style="font-size:11px;color:#8fa3c8">累積${s.unlockPt}Pで習得</span></div>`;
  });
  html+=`<div class="subitem" onclick="cmdMain()"><span>↩ もどる</span><span></span></div></div>`;
  document.getElementById('cmdArea').innerHTML=html;
}
function cmdItems(){
  SFX.tick();
  if(!state.inv) state.inv={};
  let html='<div class="submenu">';
  let any=false;
  ITEM_DEFS.forEach(d=>{
    const n=state.inv[d.id]||0;
    if(n>0){ any=true;
      html+=`<div class="subitem" onclick="useItem('${d.id}')"><span>${d.name}<small style="color:#8fa3c8;margin-left:8px">${d.desc}</small></span><span>×${n}</span></div>`;
    }
  });
  if(!any) html+='<div class="subitem dis"><span>アイテムなし（クエストでポイントを貯めると自動でもらえる）</span><span></span></div>';
  html+=`<div class="subitem" onclick="cmdMain()"><span>↩ もどる</span><span></span></div></div>`;
  document.getElementById('cmdArea').innerHTML=html;
}
function closeCmd(){
  document.getElementById('cmdArea').innerHTML='';
  document.querySelectorAll('.hero-spr').forEach(e=>e.classList.remove('active'));
}
function endTurn(){
  if(B.turnHero) B.turnHero.atb=0;
  B.turnHero=null; B.menuOpen=false; closeCmd(); renderRows();
  checkEnd();
}

// ── 演出ヘルパー ──
function popDmg(targetId, text, color){
  const scr=document.getElementById('btlScreen');
  const t=document.getElementById(targetId);
  if(!t) return;
  const d=document.createElement('div');
  d.className='dmg'; d.textContent=text; d.style.color=color||'#fff';
  const r=t.getBoundingClientRect(), sr=scr.getBoundingClientRect();
  d.style.left=(r.left-sr.left+r.width*.3+Math.random()*20)+'px';
  d.style.top=(r.top-sr.top)+'px';
  scr.appendChild(d);
  setTimeout(()=>d.remove(),950);
}
function fxShake(){const s=document.getElementById('btlScreen');s.classList.remove('shake');void s.offsetWidth;s.classList.add('shake');}
function fxFlashFoe(){const f=document.getElementById('foeSpr');f.classList.remove('flash');void f.offsetWidth;f.classList.add('flash');}
function fxLunge(idx){const e=document.getElementById('hero'+idx);if(!e)return;e.classList.add('atk-fwd');setTimeout(()=>e.classList.remove('atk-fwd'),300);}
function fxCutin(text,color){
  const scr=document.getElementById('btlScreen');
  SFX.cutin();
  const c=document.createElement('div'); c.className='cutin'; c.textContent=text;
  if(color) c.style.color=color;
  scr.appendChild(c); setTimeout(()=>c.remove(),1100);
}
function critChance(){ return Math.min(.25,(state.streak||0)*.02); }

// ── プレイヤーの行動 ──
function dealToFoe(base,label){
  let dmg=Math.round(base*(0.9+Math.random()*.2));
  const crit=Math.random()<critChance();
  if(crit) dmg=Math.round(dmg*1.8);
  B.foe.hp-=dmg;
  SFX.attack();
  fxFlashFoe(); fxShake();
  popDmg('foeSpr',dmg,(crit?'#ffd166':'#fff'));
  bmsg(`${label} ${B.foe.name}に <b style="color:#ffd166">${dmg}</b> ダメージ！${crit?` <b style="color:#ffd166">クリティカル！（れんぞく${state.streak}日ボーナス）</b>`:''}`);
}
async function doAttack(){
  const h=B.turnHero, idx=B.heroes.indexOf(h);
  B.menuOpen=false; B.acting=true; closeCmd();
  fxLunge(idx);
  await wait(250);
  dealToFoe(h.atk*2.2, `⚔️ ${h.name}のこうげき！`);
  await wait(650);
  B.acting=false; endTurn();
}
async function useSkill(id){
  const h=B.turnHero, idx=B.heroes.indexOf(h);
  B.menuOpen=false; B.acting=true; closeCmd();
  if(id==='duo'){
    B.duoUsed=true;
    fxCutin('✨ ダブル・ライト ✨','#ffd166');
    await wait(800);
    fxLunge(0); fxLunge(1);
    await wait(250);
    dealToFoe((B.heroes[0].atk+B.heroes[1].mag)*3.2, '✨二人の光が重なった！');
    await wait(650);
    B.acting=false; endTurn(); return;
  }
  const s=SKILLS[h.key].find(x=>x.id===id);
  h.mp-=s.mp;
  fxCutin(s.name, h.key==='nao'?'#ff9d5c':'#7fd8ff');
  await wait(700);
  if(s.type==='heal'){
    const target=B.heroes.filter(x=>x&&x.alive).sort((a,b)=>a.hp/a.mhp-b.hp/b.mhp)[0];
    const amt=Math.round(target.mhp*.4+h.mag*2);
    target.hp=Math.min(target.mhp,target.hp+amt);
    SFX.heal();
    popDmg('hero'+B.heroes.indexOf(target),'+'+amt,'#4ade80');
    bmsg(`💚 ${s.name}！ ${target.name}のHPが ${amt} 回復した！`);
  }else{
    fxLunge(idx); await wait(200);
    dealToFoe((s.type==='phys'?h.atk:h.mag)*2.2*s.pow, `${h.key==='nao'?'💥':'🔮'} ${s.name}！`);
  }
  await wait(650);
  B.acting=false; endTurn();
}
async function useItem(id){
  B.menuOpen=false; B.acting=true; closeCmd();
  state.inv[id]--; save();
  SFX.item();
  if(id==='potion'){
    const t=B.heroes.filter(x=>x&&x.alive).sort((a,b)=>a.hp/a.mhp-b.hp/b.mhp)[0];
    const amt=Math.round(t.mhp*.5);
    t.hp=Math.min(t.mhp,t.hp+amt);
    popDmg('hero'+B.heroes.indexOf(t),'+'+amt,'#4ade80');
    bmsg(`🧪 ポーション！ ${t.name}のHPが ${amt} 回復！`);
  }else if(id==='ether'){
    const t=B.heroes.filter(x=>x&&x.alive).sort((a,b)=>a.mp/a.mmp-b.mp/b.mmp)[0];
    const amt=Math.round(t.mmp*.5);
    t.mp=Math.min(t.mmp,t.mp+amt);
    popDmg('hero'+B.heroes.indexOf(t),'+'+amt+'MP','#9bb6ff');
    bmsg(`💙 エーテル！ ${t.name}のMPが ${amt} 回復！`);
  }else if(id==='elixir'){
    const t=B.heroes.filter(x=>x&&x.alive).sort((a,b)=>a.hp/a.mhp-b.hp/b.mhp)[0];
    t.hp=t.mhp; t.mp=t.mmp;
    popDmg('hero'+B.heroes.indexOf(t),'全回復!','#ffd166');
    bmsg(`✨ エリクサー！ ${t.name}が完全回復した！`);
  }
  await wait(700);
  B.acting=false; endTurn();
}
async function doDefend(){
  const h=B.turnHero;
  B.menuOpen=false; B.acting=true; closeCmd();
  h.defend=true;
  bmsg(`🛡️ ${h.name}は身を守っている（次のダメージ半減）`);
  await wait(450);
  B.acting=false; endTurn();
}

// ── 敵の行動 ──
async function foeAct(){
  B.acting=true; B.foe.atb=0;
  const targets=B.heroes.filter(h=>h&&h.alive);
  if(!targets.length){ B.acting=false; return; }
  const t=targets[Math.floor(Math.random()*targets.length)];
  const idx=B.heroes.indexOf(t);
  const f=document.getElementById('foeSpr');
  f.classList.add('foe-fwd');
  await wait(280);
  let dmg=Math.round(B.foe.atk*2*(0.9+Math.random()*.2));
  if(t.defend){ dmg=Math.round(dmg/2); t.defend=false; }
  t.hp-=dmg;
  if(t.hp<=0){ t.hp=0; t.alive=false; }
  SFX.hit();
  fxShake();
  popDmg('hero'+idx,dmg,'#f87171');
  bmsg(`👿 ${B.foe.name}の攻撃！ ${t.name}に ${dmg} ダメージ${t.alive?'！':'…！ '+t.name+'は倒れた！'}`);
  f.classList.remove('foe-fwd');
  await wait(550);
  B.acting=false;
  renderRows(); checkEnd();
}

// ── 勝敗判定 ──
function checkEnd(){
  if(B.over) return;
  if(B.foe.hp<=0){
    B.over=true; B.foe.alive=false;
    playBgm(null); SFX.win();
    document.getElementById('foeSpr').style.opacity=0;
    fxCutin('🎉 WIN！','#ffd166');
    let drop='';
    if(Math.random()<.4){ state.inv.potion=(state.inv.potion||0)+1; save(); drop=' ポーションを落とした！'; }
    bmsg(`🎉 <b style="color:#a7f3d0">勝利！</b> 闇の霧が晴れていく…。${drop}`);
    document.getElementById('cmdArea').innerHTML='<div class="cmds"><button class="cmd" onclick="B=null;initBattle()">🔁 もう一度たたかう</button></div>';
    return;
  }
  if(!B.heroes.some(h=>h&&h.alive)){
    B.over=true;
    playBgm(null); SFX.lose();
    bmsg('💔 全員倒れた…。でも明日もクエストを続ければ、もっと強くなれる！');
    document.getElementById('cmdArea').innerHTML='<div class="cmds"><button class="cmd" onclick="B=null;initBattle()">🔁 再挑戦する</button></div>';
  }
}

// ── 起動 ──
initBg3D();
render();
document.getElementById('muteBtn').textContent=state.muted?'🔇':'🔊';
</script>
