<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>直幸QUEST2 〜南の新大陸と光の絆〜（試作版）</title>
<style>
:root{
  --bg:#0a0e1a; --panel:#141b2e; --panel2:#1c2540;
  --border:#2a3a5c; --text:#e8eef8; --sub:#8fa3c8;
  --gold:#ffd166; --fire:#ff6b35; --water:#4cc9f0; --light:#a7f3d0;
  --hp:#4ade80; --hpBad:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN',sans-serif;overflow-x:hidden;}
#app{max-width:820px;margin:0 auto;padding:0 12px 80px;}

/* ── 3D canvas ── */
#bg3d{position:fixed;inset:0;z-index:0;}
#app,#tabbar{position:relative;z-index:1;}

/* ── header ── */
.hero-header{text-align:center;padding:18px 0 6px;}
.hero-header h1{
  font-size:26px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--fire),var(--water));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,209,102,.35));
}
.hero-header .sub{color:var(--sub);font-size:12px;margin-top:4px;}
.proto-badge{display:inline-block;margin-top:6px;font-size:11px;color:var(--bg);background:var(--gold);border-radius:999px;padding:2px 10px;font-weight:bold;}

/* ── panels ── */
.panel{background:rgba(20,27,46,.88);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:14px;backdrop-filter:blur(6px);}
.panel h2{font-size:16px;color:var(--gold);margin-bottom:10px;}
.stats-row{display:flex;gap:10px;margin-top:14px;}
.stat{flex:1;background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:10px;text-align:center;}
.stat .v{font-size:22px;font-weight:bold;color:var(--gold);}
.stat .l{font-size:11px;color:var(--sub);margin-top:2px;}

/* ── duo bond gauge ── */
.bond-wrap{margin-top:8px;}
.bond-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:4px;}
.bond-bar{height:14px;background:#0d1322;border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.bond-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--water),var(--light),var(--gold));transition:width .6s ease;}

/* ── tasks ── */
.task{display:flex;align-items:center;gap:12px;background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:8px;cursor:pointer;transition:transform .1s;}
.task:active{transform:scale(.98);}
.task.done{opacity:.55;border-color:var(--hp);}
.task .check{width:26px;height:26px;border-radius:8px;border:2px solid var(--sub);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.task.done .check{background:var(--hp);border-color:var(--hp);color:#06281a;}
.task .name{flex:1;font-size:15px;}
.task .pt{color:var(--gold);font-weight:bold;font-size:14px;}

/* ── battle ── */
#battleStage{width:100%;aspect-ratio:16/10;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#05070f;}
.hpbars{display:flex;justify-content:space-between;gap:14px;margin-top:10px;}
.hpunit{flex:1;}
.hpunit .nm{font-size:12px;color:var(--sub);margin-bottom:3px;display:flex;justify-content:space-between;}
.hpbar{height:12px;background:#0d1322;border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.hpfill{height:100%;background:var(--hp);border-radius:999px;transition:width .4s ease;}
.hpfill.bad{background:var(--hpBad);}
.btl-actions{display:flex;gap:8px;margin-top:12px;}
.btn{flex:1;border:none;border-radius:12px;padding:13px 8px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;}
.btn-nao{background:linear-gradient(135deg,var(--gold),var(--fire));color:#231200;}
.btn-rai{background:linear-gradient(135deg,var(--water),#7c8cf8);color:#001a2e;}
.btn-duo{background:linear-gradient(135deg,var(--light),var(--gold),var(--fire));color:#1a1200;}
.btn:disabled{opacity:.4;}
#btlLog{margin-top:10px;font-size:13px;color:var(--sub);min-height:40px;line-height:1.7;}

/* ── story ── */
.scene{background:rgba(28,37,64,.9);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px;font-size:14px;line-height:1.9;}
.scene.locked{opacity:.45;}
.scene .pt-tag{font-size:11px;color:var(--gold);margin-bottom:6px;}
.scene .speaker-rai{color:var(--water);font-weight:bold;}
.scene .speaker-nao{color:var(--gold);font-weight:bold;}

/* ── tabs ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(10,14,26,.95);border-top:1px solid var(--border);backdrop-filter:blur(10px);}
.tab{flex:1;border:none;background:none;color:var(--sub);font-size:12px;padding:10px 0 14px;cursor:pointer;font-family:inherit;}
.tab.active{color:var(--gold);}
.tab .ic{font-size:20px;display:block;margin-bottom:2px;}
.view{display:none;}
.view.active{display:block;}
</style>
</head>
<body>
<canvas id="bg3d"></canvas>
<div id="app">
  <div class="hero-header">
    <h1>直幸QUEST2</h1>
    <div class="sub">〜南の新大陸と光の絆〜</div>
    <div class="proto-badge">試作版 ver 0.1</div>
  </div>

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="stats-row">
      <div class="stat"><div class="v" id="stTotal">0</div><div class="l">累積ポイント</div></div>
      <div class="stat"><div class="v" id="stToday">0</div><div class="l">今日のポイント</div></div>
      <div class="stat"><div class="v" id="stStreak">0</div><div class="l">連続日数</div></div>
    </div>
    <div class="panel">
      <h2>🤝 ナオ＆ライ 絆ゲージ</h2>
      <div class="bond-wrap">
        <div class="bond-label"><span>二人の絆</span><span id="bondPct">0%</span></div>
        <div class="bond-bar"><div class="bond-fill" id="bondFill" style="width:0%"></div></div>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:8px;line-height:1.7;">
        クエストをこなすたびに絆が深まる。絆ゲージが満タンになると、バトルで<b style="color:var(--gold)">合体必殺技「ダブル・ライト」</b>が使えるようになる！
      </div>
    </div>
    <div class="panel">
      <h2>📋 今日のクエスト</h2>
      <div id="taskList"></div>
    </div>
  </div>

  <!-- BATTLE -->
  <div class="view" id="view-battle">
    <div class="panel">
      <h2>⚔️ 3Dバトル（デモ）：荒波のガーディアン</h2>
      <div id="battleStage"></div>
      <div class="hpbars">
        <div class="hpunit"><div class="nm"><span>🛡️ ナオ＆ライ</span><span id="heroHpTxt">100/100</span></div><div class="hpbar"><div class="hpfill" id="heroHp" style="width:100%"></div></div></div>
        <div class="hpunit"><div class="nm"><span>👹 ガーディアン</span><span id="foeHpTxt">120/120</span></div><div class="hpbar"><div class="hpfill" id="foeHp" style="width:100%"></div></div></div>
      </div>
      <div class="btl-actions">
        <button class="btn btn-nao" id="btnNao" onclick="attack('nao')">🔥 ナオの剣撃</button>
        <button class="btn btn-rai" id="btnRai" onclick="attack('rai')">💧 ライの光魔法</button>
        <button class="btn btn-duo" id="btnDuo" onclick="attack('duo')" disabled>✨ ダブル・ライト</button>
      </div>
      <div id="btlLog">バトル開始！ナオとライが構えた。</div>
    </div>
  </div>

  <!-- STORY -->
  <div class="view" id="view-story">
    <div class="panel">
      <h2>📖 第1章「二人の船出」</h2>
      <div id="storyList"></div>
    </div>
  </div>
</div>

<div id="tabbar">
  <button class="tab active" data-v="home" onclick="go('home')"><span class="ic">🏠</span>ホーム</button>
  <button class="tab" data-v="battle" onclick="go('battle')"><span class="ic">⚔️</span>バトル</button>
  <button class="tab" data-v="story" onclick="go('story')"><span class="ic">📖</span>ストーリー</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
'use strict';
/* =====================================================
   直幸QUEST2 試作版
   - localStorage key: naoyuki_quest2_proto（本編とは別キー）
   - 3D: Three.js r160（CDN）
   ===================================================== */

// ── タスク（本編と同じ9つ） ──
const TASKS = [
  {id:'wake',   name:'朝６時までに起きる', pt:5},
  {id:'mteeth', name:'朝のはみがき',       pt:5},
  {id:'dish',   name:'食洗機の食器を片付ける', pt:5},
  {id:'zkai',   name:'Z会',               pt:40},
  {id:'hw',     name:'宿題',              pt:20},
  {id:'piano',  name:'ピアノ',            pt:5},
  {id:'bath',   name:'お風呂',            pt:5},
  {id:'nteeth', name:'夜のはみがき',       pt:5},
  {id:'duo',    name:'デュオリンゴ',       pt:10},
];

// ── シーズン2 第1章（試作：5シーン） ──
const STORY = [
  {pt:0, text:'ハジマリ村の港。大きな白い帆船の前に、ナオとライが並んで立っていた。<span class="speaker-rai">ライ</span>「本当に、俺も行っていいのか」<span class="speaker-nao">ナオ</span>「当たり前だろ。約束したじゃないか。一緒に、また始めようって」ライは新しいクエストの書を胸に抱えた。真っ白なページの一番上に、今日の日付と最初のクエストが書き込まれていた。百年ぶりの、一行目だった。'},
  {pt:30, text:'船が南へ進む。ライは船べりで、慣れない手つきでクエストの書をつけていた。<span class="speaker-rai">ライ</span>「……たった一行書くだけなのに、手が震える」<span class="speaker-nao">ナオ</span>「最初はみんなそうだよ。でも明日も書けば、震えなくなる」ライは笑った。百年間忘れていた、続けることの怖さと、嬉しさを思い出しながら。'},
  {pt:70, text:'三日目の朝、ライが誰よりも早く甲板に出ていた。朝日に向かって、剣の素振りをしている。<span class="speaker-nao">ナオ</span>「早いね」<span class="speaker-rai">ライ</span>「三日続いた。たった三日だ。でも、百年で一番誇らしい三日だ」その目には、かつてのヤミノ王の影はもうなかった。ナオは隣に並び、一緒に剣を振った。'},
  {pt:120, text:'突然、海が割れた。巨大な水の巨人「荒波のガーディアン」が船の行く手を塞いだ。「新大陸に渡りたくば、二人の絆を見せてみよ」ナオが剣を抜き、ライが光の魔法を構えた。二人が背中合わせに立つ。<span class="speaker-nao">ナオ</span>「ライ、合わせられるか」<span class="speaker-rai">ライ</span>「ああ。お前となら」初めての、二人での戦いが始まった。'},
  {pt:180, text:'ナオの剣撃とライの光魔法が重なった瞬間、二つの光が螺旋を描いて一つになった。合体技「ダブル・ライト」。荒波のガーディアンは光に貫かれ、静かに頭を垂れた。「見事な絆だ。通るがよい」海が開き、水平線の向こうに緑の大陸が見えた。<span class="speaker-rai">ライ</span>「あれが、南の新大陸……」二人の新しい冒険が、いま本当に始まる。第1章・完。'},
];

// ── 状態 ──
const KEY='naoyuki_quest2_proto';
function load(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function today(){const d=new Date(Date.now()+9*36e5);return d.toISOString().split('T')[0];}
let state = load() || {total:0, history:{}, streak:0, lastDay:null};

// ── レンダリング ──
function todayDone(){return state.history[today()]||[];}
function todayPt(){return todayDone().reduce((a,id)=>{const t=TASKS.find(t=>t.id===id);return a+(t?t.pt:0);},0);}
function bondPct(){return Math.min(100, Math.round(todayDone().length/TASKS.length*100));}

function render(){
  document.getElementById('stTotal').textContent=state.total;
  document.getElementById('stToday').textContent=todayPt();
  document.getElementById('stStreak').textContent=state.streak;
  const pct=bondPct();
  document.getElementById('bondFill').style.width=pct+'%';
  document.getElementById('bondPct').textContent=pct+'%';
  document.getElementById('btnDuo').disabled = pct<100 || btl.over;

  const list=document.getElementById('taskList');
  list.innerHTML='';
  const done=todayDone();
  TASKS.forEach(t=>{
    const d=done.includes(t.id);
    const el=document.createElement('div');
    el.className='task'+(d?' done':'');
    el.innerHTML=`<div class="check">${d?'✓':''}</div><div class="name">${t.name}</div><div class="pt">+${t.pt}P</div>`;
    el.onclick=()=>toggle(t.id);
    list.appendChild(el);
  });

  const sl=document.getElementById('storyList');
  sl.innerHTML='';
  STORY.forEach(sc=>{
    const open=state.total>=sc.pt;
    const el=document.createElement('div');
    el.className='scene'+(open?'':' locked');
    el.innerHTML=`<div class="pt-tag">${sc.pt}P で解放</div>${open?sc.text:'🔒 クエストを続けると読めるようになる'}`;
    sl.appendChild(el);
  });
}

function toggle(id){
  const d=today();
  if(!state.history[d]) state.history[d]=[];
  const arr=state.history[d];
  const t=TASKS.find(t=>t.id===id);
  const i=arr.indexOf(id);
  if(i>=0){arr.splice(i,1); state.total-=t.pt;}
  else{
    arr.push(id); state.total+=t.pt;
    if(state.lastDay!==d){
      const y=new Date(Date.now()+9*36e5-864e5).toISOString().split('T')[0];
      state.streak=(state.lastDay===y)?state.streak+1:1;
      state.lastDay=d;
    }
  }
  save(); render();
}

function go(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`.tab[data-v="${v}"]`).classList.add('active');
  if(v==='battle') initBattle3D();
}

/* =====================================================
   3D 背景（タイトル：海と新大陸の島）
   ===================================================== */
let bgRenderer, bgScene, bgCam, island, ocean, stars=[];
function initBg3D(){
  const cv=document.getElementById('bg3d');
  bgRenderer=new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:false});
  bgRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  bgScene=new THREE.Scene();
  bgScene.fog=new THREE.Fog(0x0a0e1a, 18, 60);
  bgScene.background=new THREE.Color(0x0a0e1a);
  bgCam=new THREE.PerspectiveCamera(55, innerWidth/innerHeight, .1, 100);
  bgCam.position.set(0, 3.5, 13);
  bgCam.lookAt(0, 1, 0);

  bgScene.add(new THREE.AmbientLight(0x334466, 1.2));
  const moon=new THREE.DirectionalLight(0xaac8ff, 1.4);
  moon.position.set(-6, 10, 4); bgScene.add(moon);
  const warm=new THREE.PointLight(0xffd166, 2.5, 30);
  warm.position.set(2, 4, 2); bgScene.add(warm);

  // 海（揺れる平面）
  const og=new THREE.PlaneGeometry(80, 80, 48, 48);
  ocean=new THREE.Mesh(og, new THREE.MeshStandardMaterial({color:0x12305a, metalness:.6, roughness:.4, flatShading:true}));
  ocean.rotation.x=-Math.PI/2; bgScene.add(ocean);

  // 新大陸の島（ローポリ円錐群）
  island=new THREE.Group();
  const mk=(geo,col,x,y,z,s)=>{const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:col,flatShading:true}));m.position.set(x,y,z);m.scale.setScalar(s);island.add(m);return m;};
  mk(new THREE.ConeGeometry(2.2,3,7), 0x2d6a4f, 0, 1.4, 0, 1);          // 山
  mk(new THREE.ConeGeometry(1.4,2,6), 0x40916c, -2.1, .9, .8, 1);       // 丘
  mk(new THREE.ConeGeometry(1.1,1.6,6), 0x40916c, 1.9, .7, -.6, 1);     // 丘
  mk(new THREE.ConeGeometry(.55,1.5,5), 0xffd166, 0, 3.6, 0, 1);        // 光の山頂
  mk(new THREE.CylinderGeometry(3.2,3.6,.8,9), 0xc2a86b, 0, .1, 0, 1);  // 砂浜
  island.position.set(0, .2, -4);
  bgScene.add(island);

  // 星
  const sg=new THREE.SphereGeometry(.05,4,4);
  const sm=new THREE.MeshBasicMaterial({color:0xffffff});
  for(let i=0;i<120;i++){
    const st=new THREE.Mesh(sg,sm);
    st.position.set((Math.random()-.5)*70, 6+Math.random()*22, -10-Math.random()*40);
    stars.push(st); bgScene.add(st);
  }
  resizeBg(); animateBg();
}
function resizeBg(){
  bgRenderer.setSize(innerWidth, innerHeight);
  bgCam.aspect=innerWidth/innerHeight; bgCam.updateProjectionMatrix();
}
let bgT=0;
function animateBg(){
  requestAnimationFrame(animateBg);
  bgT+=.012;
  // 波
  const pos=ocean.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i);
    pos.setZ(i, Math.sin(x*.5+bgT)*.25 + Math.cos(y*.4+bgT*.8)*.2);
  }
  pos.needsUpdate=true;
  island.rotation.y+=.0015;
  island.position.y=.2+Math.sin(bgT*.5)*.08;
  bgRenderer.render(bgScene, bgCam);
}
addEventListener('resize', resizeBg);

/* =====================================================
   3D バトル（デモ）
   ===================================================== */
let btl={inited:false, over:false, heroHp:100, foeHp:120, busy:false};
let bRenderer, bScene, bCam, naoMesh, raiMesh, foeMesh, fxGroup;
let foeCore, foeBody, foeBase, capes=[], shake=0, camBase=new THREE.Vector3(0,2.7,7.2);
let arenaWater, lightning;

// 光の粒テクスチャ（放射状グラデーションをその場で生成）
function makeGlowTexture(){
  const cv=document.createElement('canvas'); cv.width=cv.height=64;
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.3,'rgba(255,255,255,.8)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=g; c.fillRect(0,0,64,64);
  const tx=new THREE.CanvasTexture(cv); return tx;
}
let glowTex;

// ── 勇者（高精細版：鎧・マント・剣・髪） ──
function makeHero(opt){
  const g=new THREE.Group();
  const std=(c,r,m)=>new THREE.MeshStandardMaterial({color:c, roughness:r??.55, metalness:m??.1});
  const sh=mesh=>{mesh.castShadow=true; return mesh;};

  // 脚＋ブーツ
  [-.14,.14].forEach(x=>{
    const leg=sh(new THREE.Mesh(new THREE.CapsuleGeometry(.09,.42,4,8), std(0x2b3350,.8)));
    leg.position.set(x,.42,0); g.add(leg);
    const boot=sh(new THREE.Mesh(new THREE.BoxGeometry(.16,.14,.26), std(0x3d2b1f,.9)));
    boot.position.set(x,.08,.04); g.add(boot);
  });
  // 胴体＋胸当て
  const torso=sh(new THREE.Mesh(new THREE.CapsuleGeometry(.26,.5,6,12), std(opt.cloth,.7)));
  torso.position.y=.95; g.add(torso);
  const chest=sh(new THREE.Mesh(new THREE.CylinderGeometry(.3,.27,.42,12), std(opt.armor,.3,.85)));
  chest.position.y=1.08; chest.scale.z=.72; g.add(chest);
  // ベルト
  const belt=sh(new THREE.Mesh(new THREE.TorusGeometry(.27,.04,8,16), std(0x8a6d3b,.4,.6)));
  belt.rotation.x=Math.PI/2; belt.position.y=.78; belt.scale.z=.8; g.add(belt);
  // 肩当て
  [-.34,.34].forEach(x=>{
    const pad=sh(new THREE.Mesh(new THREE.SphereGeometry(.15,12,8,0,Math.PI*2,0,Math.PI/2), std(opt.armor,.3,.85)));
    pad.position.set(x,1.32,0); g.add(pad);
  });
  // 腕
  [-.36,.36].forEach(x=>{
    const arm=sh(new THREE.Mesh(new THREE.CapsuleGeometry(.07,.4,4,8), std(opt.cloth,.7)));
    arm.position.set(x,1.0,.02); arm.rotation.z=x>0?-.18:.18; g.add(arm);
  });
  // 頭・髪・目
  const head=sh(new THREE.Mesh(new THREE.SphereGeometry(.24,16,14), std(0xffd9b3,.6)));
  head.position.y=1.68; g.add(head);
  const hair=sh(new THREE.Mesh(new THREE.SphereGeometry(.255,14,10,0,Math.PI*2,0,Math.PI*.55), std(opt.hair,.85)));
  hair.position.y=1.72; hair.rotation.x=-.25; g.add(hair);
  const eyeM=new THREE.MeshBasicMaterial({color:0x222233});
  [-.09,.09].forEach(x=>{const e=new THREE.Mesh(new THREE.SphereGeometry(.028,6,6),eyeM);e.position.set(x,1.69,.21);g.add(e);});
  // マント（頂点アニメ用に分割平面）
  const capeGeo=new THREE.PlaneGeometry(.55,.85,4,8);
  const cape=new THREE.Mesh(capeGeo, new THREE.MeshStandardMaterial({color:opt.cape, roughness:.85, side:THREE.DoubleSide}));
  cape.position.set(0,1.18,-.3); cape.rotation.x=.18; cape.castShadow=true;
  cape.userData.base=capeGeo.attributes.position.array.slice();
  capes.push(cape); g.add(cape);
  // 剣（刃＋鍔＋柄、刃は発光）
  const sword=new THREE.Group();
  const blade=new THREE.Mesh(new THREE.BoxGeometry(.055,.85,.015),
    new THREE.MeshStandardMaterial({color:0xe8eef8, roughness:.15, metalness:.9, emissive:opt.glow, emissiveIntensity:.55}));
  blade.position.y=.55; sword.add(blade);
  const tip=new THREE.Mesh(new THREE.ConeGeometry(.04,.12,4),
    blade.material); tip.position.y=1.02; tip.rotation.y=Math.PI/4; sword.add(tip);
  const guard=new THREE.Mesh(new THREE.BoxGeometry(.2,.04,.05), std(0xc9a227,.3,.9)); guard.position.y=.12; sword.add(guard);
  const grip=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.2,8), std(0x4a3020,.8)); sword.add(grip);
  const swLight=new THREE.PointLight(opt.glow,.9,2.5); swLight.position.y=.6; sword.add(swLight);
  sword.position.set(.42,.95,.12); sword.rotation.z=-.55;
  g.add(sword); g.userData.sword=sword;
  return g;
}

// ── 荒波のガーディアン（水のタイタン：脈動する体＋発光コア＋氷の冠） ──
function makeFoe(){
  const g=new THREE.Group();
  const waterM=new THREE.MeshStandardMaterial({
    color:0x15518f, roughness:.1, metalness:.45,
    transparent:true, opacity:.92, emissive:0x062a55, emissiveIntensity:.85,
  });
  // 体（頂点を波打たせる）
  foeBody=new THREE.Mesh(new THREE.IcosahedronGeometry(1.25,2), waterM);
  foeBody.position.y=1.7; foeBody.castShadow=true;
  foeBase=foeBody.geometry.attributes.position.array.slice();
  g.add(foeBody);
  // 発光コア（心臓）
  foeCore=new THREE.Mesh(new THREE.SphereGeometry(.42,16,16),
    new THREE.MeshBasicMaterial({color:0x9ef0ff, transparent:true, opacity:.95}));
  foeCore.position.y=1.7; g.add(foeCore);
  const coreLight=new THREE.PointLight(0x6fd8ff, 3, 8); coreLight.position.y=1.7; g.add(coreLight);
  // 頭
  const head=new THREE.Mesh(new THREE.IcosahedronGeometry(.6,1), waterM);
  head.position.y=3.05; head.castShadow=true; g.add(head);
  // 目（怒りの赤）
  const eyeM=new THREE.MeshBasicMaterial({color:0xff5544});
  [-.22,.22].forEach(x=>{
    const e=new THREE.Mesh(new THREE.SphereGeometry(.09,8,8),eyeM); e.position.set(x,3.1,.5); g.add(e);
    const el=new THREE.PointLight(0xff5544,.6,2); el.position.set(x,3.1,.55); g.add(el);
  });
  // 氷の冠
  for(let i=0;i<7;i++){
    const a=(i/7)*Math.PI*2;
    const ice=new THREE.Mesh(new THREE.ConeGeometry(.09,.45+Math.random()*.3,5),
      new THREE.MeshStandardMaterial({color:0xbfe8ff, roughness:.05, metalness:.1, transparent:true, opacity:.85}));
    ice.position.set(Math.cos(a)*.45, 3.55, Math.sin(a)*.45);
    ice.rotation.set(Math.sin(a)*.3,0,-Math.cos(a)*.3);
    g.add(ice);
  }
  // 腕（うねる水流）
  [-1.4,1.4].forEach(x=>{
    const arm=new THREE.Mesh(new THREE.CapsuleGeometry(.3,1.1,4,10), waterM);
    arm.position.set(x,1.75,0); arm.rotation.z=x>0?-.65:.65; arm.castShadow=true; g.add(arm);
    const fist=new THREE.Mesh(new THREE.SphereGeometry(.4,12,10), waterM);
    fist.position.set(x*1.35,1.05,0); fist.castShadow=true; g.add(fist);
  });
  return g;
}

function initBattle3D(){
  if(btl.inited){return;}
  btl.inited=true;
  glowTex=makeGlowTexture();
  const stage=document.getElementById('battleStage');
  const cv=document.createElement('canvas');
  stage.appendChild(cv);
  bRenderer=new THREE.WebGLRenderer({canvas:cv, antialias:true});
  bRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  bRenderer.shadowMap.enabled=true;
  bRenderer.shadowMap.type=THREE.PCFSoftShadowMap;
  bRenderer.outputEncoding=THREE.sRGBEncoding;
  bRenderer.toneMapping=THREE.ACESFilmicToneMapping;
  bRenderer.toneMappingExposure=.92;

  bScene=new THREE.Scene();
  bScene.background=new THREE.Color(0x060a16);
  bScene.fog=new THREE.FogExp2(0x060a16, .045);
  bCam=new THREE.PerspectiveCamera(48, 16/10, .1, 60);
  bCam.position.copy(camBase); bCam.lookAt(0, 1.4, 0);

  // ── 照明（月光＋リム＋環境） ──
  bScene.add(new THREE.HemisphereLight(0x4a6398, 0x070c18, .5));
  const key=new THREE.DirectionalLight(0xb8d0ff, .95);
  key.position.set(5,10,6); key.castShadow=true;
  key.shadow.mapSize.set(1024,1024);
  key.shadow.camera.left=-8; key.shadow.camera.right=8;
  key.shadow.camera.top=8; key.shadow.camera.bottom=-8;
  bScene.add(key);
  const rim=new THREE.PointLight(0xff8c42, 1.6, 18); rim.position.set(-5,2.5,-3); bScene.add(rim);

  // ── アリーナ：揺れる海面＋光るルーン円＋岩柱 ──
  const wg=new THREE.CircleGeometry(11, 64);
  arenaWater=new THREE.Mesh(wg, new THREE.MeshStandardMaterial({
    color:0x0e2a52, roughness:.1, metalness:.65,
  }));
  arenaWater.rotation.x=-Math.PI/2; arenaWater.receiveShadow=true; bScene.add(arenaWater);
  // 戦いの足場（石の円盤）
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(5.2,5.6,.35,48),
    new THREE.MeshStandardMaterial({color:0x222a42, roughness:.9}));
  disc.position.y=.02; disc.receiveShadow=true; bScene.add(disc);
  // ルーンの光輪
  const ring=new THREE.Mesh(new THREE.TorusGeometry(4.6,.05,8,80),
    new THREE.MeshBasicMaterial({color:0x4cc9f0, transparent:true, opacity:.7}));
  ring.rotation.x=Math.PI/2; ring.position.y=.22; bScene.add(ring);
  lightning=ring;
  // 周囲の岩柱（遠景の迫力）
  for(let i=0;i<9;i++){
    const a=(i/9)*Math.PI*2+.3;
    const h=2.5+Math.random()*4;
    const rock=new THREE.Mesh(new THREE.CylinderGeometry(.35+Math.random()*.3,.6+Math.random()*.4,h,7),
      new THREE.MeshStandardMaterial({color:0x222c44, roughness:.95, flatShading:true}));
    rock.position.set(Math.cos(a)*(7.5+Math.random()*2), h/2-.4, Math.sin(a)*(7.5+Math.random()*2));
    rock.rotation.y=Math.random()*Math.PI; rock.castShadow=true;
    bScene.add(rock);
  }
  // 漂う霧（スプライト）
  for(let i=0;i<10;i++){
    const m=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex, color:0x33507a, transparent:true, opacity:.10, depthWrite:false}));
    m.scale.setScalar(5+Math.random()*5);
    m.position.set((Math.random()-.5)*14, .4+Math.random()*1.2, (Math.random()-.5)*10);
    bScene.add(m);
  }

  naoMesh=makeHero({cloth:0x9a6b1f, armor:0xd9b54a, hair:0x4a3220, cape:0xb33939, glow:0xffd166});
  naoMesh.position.set(-2.5,.2,.7); naoMesh.rotation.y=.7; bScene.add(naoMesh);
  raiMesh=makeHero({cloth:0x2c4a7a, armor:0x8fb8e8, hair:0x1a1a2e, cape:0xf0f4ff, glow:0x4cc9f0});
  raiMesh.position.set(-2.5,.2,-1.0); raiMesh.rotation.y=.6; bScene.add(raiMesh);
  foeMesh=makeFoe(); foeMesh.position.set(2.7,.2,0); foeMesh.rotation.y=-.85; bScene.add(foeMesh);
  fxGroup=new THREE.Group(); bScene.add(fxGroup);

  resizeBattle(); animateBattle();
  addEventListener('resize', resizeBattle);
}
function resizeBattle(){
  const stage=document.getElementById('battleStage');
  if(!stage||!bRenderer)return;
  const w=stage.clientWidth, h=stage.clientHeight;
  bRenderer.setSize(w,h); bCam.aspect=w/h; bCam.updateProjectionMatrix();
}
let bT=0;
function animateBattle(){
  requestAnimationFrame(animateBattle);
  if(!bRenderer)return;
  bT+=.03;
  // 勇者：呼吸＋剣の構え揺れ
  naoMesh.position.y=.2+Math.abs(Math.sin(bT*1.1))*.05;
  raiMesh.position.y=.2+Math.abs(Math.sin(bT*1.1+.9))*.05;
  naoMesh.userData.sword.rotation.z=-.55+Math.sin(bT*.9)*.06;
  raiMesh.userData.sword.rotation.z=-.55+Math.sin(bT*.9+.5)*.06;
  // マントのなびき（頂点アニメ）
  capes.forEach((cape,ci)=>{
    const pos=cape.geometry.attributes.position, base=cape.userData.base;
    for(let i=0;i<pos.count;i++){
      const y=base[i*3+1];
      const w=(.425-y)/.85; // 下ほど大きく揺れる
      pos.setZ(i, base[i*3+2]+Math.sin(bT*2.2+y*4+ci)*.10*w+Math.sin(bT*3.7+ci*2)*.04*w);
    }
    pos.needsUpdate=true; cape.geometry.computeVertexNormals();
  });
  // ガーディアン：体表が波打つ＋コア脈動
  if(foeBody&&foeMesh.visible){
    const pos=foeBody.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      const x=foeBase[i*3],y=foeBase[i*3+1],z=foeBase[i*3+2];
      const n=1+Math.sin(bT*2+x*3+y*2)*.05+Math.cos(bT*1.5+z*4)*.04;
      pos.setXYZ(i,x*n,y*n,z*n);
    }
    pos.needsUpdate=true; foeBody.geometry.computeVertexNormals();
    foeCore.scale.setScalar(1+Math.sin(bT*3)*.12);
    foeCore.material.opacity=.75+Math.sin(bT*3)*.2;
  }
  foeMesh.position.y=.2+Math.sin(bT*.7)*.12;
  foeMesh.rotation.y=-.85+Math.sin(bT*.35)*.08;
  // ルーン円の回転と明滅
  if(lightning){lightning.rotation.z+=.004; lightning.material.opacity=.5+Math.sin(bT*2)*.25;}
  // カメラ：ゆったり漂い＋シェイク
  const sway=Math.sin(bT*.3)*.25;
  bCam.position.set(camBase.x+sway+(Math.random()-.5)*shake,
                    camBase.y+Math.sin(bT*.45)*.1+(Math.random()-.5)*shake,
                    camBase.z+(Math.random()-.5)*shake);
  bCam.lookAt(0,1.4,0);
  shake*=.88;
  // エフェクト粒子（加算合成スプライト）
  for(let i=fxGroup.children.length-1;i>=0;i--){
    const p=fxGroup.children[i];
    p.position.add(p.userData.v);
    p.userData.v.y-=p.userData.g||0;       // 重力
    p.userData.life-=p.userData.decay||.02;
    p.material.opacity=Math.max(0,p.userData.life);
    if(p.userData.grow) p.scale.multiplyScalar(p.userData.grow);
    if(p.userData.life<=0){fxGroup.remove(p);}
  }
  bRenderer.render(bScene, bCam);
}
// 光の爆発（加算合成のスプライト粒子）
function burst(pos, color, n, opt={}){
  for(let i=0;i<n;i++){
    const p=new THREE.Sprite(new THREE.SpriteMaterial({
      map:glowTex, color, transparent:true, opacity:1,
      blending:THREE.AdditiveBlending, depthWrite:false,
    }));
    p.position.copy(pos);
    p.scale.setScalar(.18+Math.random()*.4);
    const sp=opt.speed||.28;
    p.userData={
      v:new THREE.Vector3((Math.random()-.5)*sp,(Math.random()-.2)*sp,(Math.random()-.5)*sp),
      life:1, decay:.015+Math.random()*.02, g:opt.gravity??.006,
    };
    fxGroup.add(p);
  }
  shake=Math.max(shake, opt.shake??.12);
}
// 衝撃波リング
function shockwave(pos, color){
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.3,.06,8,40),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:.9, blending:THREE.AdditiveBlending, depthWrite:false}));
  ring.position.copy(pos); ring.rotation.x=Math.PI/2;
  ring.userData={v:new THREE.Vector3(0,.005,0), life:1, decay:.04, grow:1.13};
  fxGroup.add(ring);
}
// 被弾フラッシュ
function hitFlash(){
  if(!foeBody)return;
  const m=foeBody.material;
  m.emissive.setHex(0xff6666); m.emissiveIntensity=1.6;
  setTimeout(()=>{m.emissive.setHex(0x062a55); m.emissiveIntensity=.85;},140);
}

function setHp(){
  const h=Math.max(0,btl.heroHp), f=Math.max(0,btl.foeHp);
  const hb=document.getElementById('heroHp'), fb=document.getElementById('foeHp');
  hb.style.width=h+'%'; hb.classList.toggle('bad',h<35);
  fb.style.width=(f/120*100)+'%'; fb.classList.toggle('bad',f<40);
  document.getElementById('heroHpTxt').textContent=h+'/100';
  document.getElementById('foeHpTxt').textContent=f+'/120';
}
function log(t){document.getElementById('btlLog').innerHTML=t;}
function lockBtns(v){['btnNao','btnRai'].forEach(id=>document.getElementById(id).disabled=v||btl.over);
  document.getElementById('btnDuo').disabled=v||btl.over||bondPct()<100;}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
// 滑らかな突進（イージング付き）
async function dash(mesh, dist, steps=12){
  const ox=mesh.position.x;
  for(let i=1;i<=steps;i++){
    const t=i/steps, e=1-Math.pow(1-t,3); // ease-out
    mesh.position.x=ox+e*dist; await sleep(16);
  }
  return ox;
}
async function dashBack(mesh, ox, steps=10){
  const cx=mesh.position.x;
  for(let i=1;i<=steps;i++){
    const t=i/steps, e=1-Math.pow(1-t,2);
    mesh.position.x=cx+(ox-cx)*e; await sleep(16);
  }
  mesh.position.x=ox;
}
// 剣を振り下ろす
async function swing(hero){
  const sw=hero.userData.sword;
  for(let i=0;i<6;i++){sw.rotation.z=-.55-(i/6)*1.6; await sleep(14);}
  for(let i=6;i>=0;i--){sw.rotation.z=-.55-(i/6)*1.6; await sleep(20);}
}

async function attack(who){
  if(btl.busy||btl.over)return;
  btl.busy=true; lockBtns(true);
  const hitPos=()=>foeMesh.position.clone().add(new THREE.Vector3(0,1.7,0));

  if(who==='duo'){
    // ── 合体必殺技：カメラが寄り、二人同時に突進、二色の光が螺旋爆発 ──
    log('✨ 二人の絆が光になる…！');
    const oz=camBase.z;
    for(let i=0;i<14;i++){camBase.z=oz-(i/14)*2.2; await sleep(25);} // ズームイン
    burst(naoMesh.position.clone().add(new THREE.Vector3(0,1.2,0)), 0xffd166, 18, {speed:.1, gravity:0, shake:0});
    burst(raiMesh.position.clone().add(new THREE.Vector3(0,1.2,0)), 0x4cc9f0, 18, {speed:.1, gravity:0, shake:0});
    await sleep(450);
    const ox1=await dash(naoMesh, 3.6, 9);
    const ox2Promise=dash(raiMesh, 3.6, 9);
    swing(naoMesh); swing(raiMesh);
    const ox2=await ox2Promise;
    const dmg=45+Math.floor(Math.random()*15);
    burst(hitPos(), 0xffd166, 35, {speed:.4, shake:.3});
    burst(hitPos(), 0x4cc9f0, 35, {speed:.4, shake:.3});
    burst(hitPos(), 0xffffff, 20, {speed:.2, shake:.3});
    shockwave(foeMesh.position.clone().add(new THREE.Vector3(0,.3,0)), 0xa7f3d0);
    shockwave(foeMesh.position.clone().add(new THREE.Vector3(0,.3,0)), 0xffd166);
    hitFlash();
    btl.foeHp-=dmg; setHp();
    log(`<b style="color:#a7f3d0">✨ダブル・ライト✨</b> 二つの光が螺旋を描いた！ ガーディアンに <b>${dmg}</b> ダメージ！！`);
    await Promise.all([dashBack(naoMesh,ox1), dashBack(raiMesh,ox2)]);
    for(let i=14;i>=0;i--){camBase.z=oz-(i/14)*2.2; await sleep(18);} // ズームアウト
    camBase.z=oz;
  } else {
    const isNao=who==='nao';
    const attacker=isNao?naoMesh:raiMesh;
    const dmg=(isNao?14:12)+Math.floor(Math.random()*(isNao?8:10));
    const color=isNao?0xffd166:0x4cc9f0;
    const name=isNao?'🔥 ナオの剣撃':'💧 ライの光魔法';
    if(isNao){
      const ox=await dash(attacker, 3.7);
      await swing(attacker);
      burst(hitPos(), color, 22, {speed:.3, shake:.18});
      shockwave(foeMesh.position.clone().add(new THREE.Vector3(0,.3,0)), color);
      hitFlash();
      btl.foeHp-=dmg; setHp();
      log(`<b style="color:#ffd166">${name}！</b> 鋭い斬撃が水の巨体を切り裂いた！ ${dmg} ダメージ！`);
      await dashBack(attacker, ox);
    }else{
      // ライは遠距離魔法：光弾が飛んでいく
      log('💧 ライが光の魔法を唱える…');
      await swing(attacker);
      const orb=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex, color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false}));
      orb.scale.setScalar(.8);
      orb.position.copy(attacker.position).add(new THREE.Vector3(.4,1.3,0));
      orb.userData={v:new THREE.Vector3(.32,.02,0), life:1.2, decay:.0, g:0};
      fxGroup.add(orb);
      await sleep(400);
      fxGroup.remove(orb);
      burst(hitPos(), color, 26, {speed:.3, shake:.18});
      shockwave(foeMesh.position.clone().add(new THREE.Vector3(0,.3,0)), color);
      hitFlash();
      btl.foeHp-=dmg; setHp();
      log(`<b style="color:#4cc9f0">${name}！</b> 光の弾がコアを直撃した！ ${dmg} ダメージ！`);
    }
  }

  if(btl.foeHp<=0){
    btl.over=true;
    // 撃破演出：白い大爆発→コアだけ残って浮かび上がり消える
    burst(hitPos(), 0xffffff, 70, {speed:.45, shake:.4});
    shockwave(foeMesh.position.clone().add(new THREE.Vector3(0,.3,0)), 0xffffff);
    await sleep(300);
    foeMesh.visible=false;
    burst(hitPos(), 0x9ef0ff, 40, {speed:.15, gravity:-.003, shake:0});
    log('🎉 <b style="color:#a7f3d0">勝利！</b>「見事な絆だ。通るがよい」水の巨人は静かに頭を垂れ、海が割れて新大陸への道が現れた！');
    btl.busy=false; lockBtns(true); return;
  }

  await sleep(500);
  // ── 敵の反撃：大波を叩きつける ──
  const fdmg=8+Math.floor(Math.random()*8);
  const fx=foeMesh.position.x;
  for(let i=0;i<10;i++){foeMesh.position.x=fx-(i/10)*3.4; await sleep(18);}
  burst(naoMesh.position.clone().add(new THREE.Vector3(0,1.1,0)), 0x6fb8e8, 20, {speed:.25, shake:.22});
  burst(raiMesh.position.clone().add(new THREE.Vector3(0,1.1,0)), 0x6fb8e8, 12, {speed:.2, shake:0});
  btl.heroHp-=fdmg; setHp();
  log(`👹 ガーディアンの大波が二人を襲う！ ${fdmg} ダメージ…！`);
  for(let i=10;i>=0;i--){foeMesh.position.x=fx-(i/10)*3.4; await sleep(20);}

  if(btl.heroHp<=0){
    btl.over=true;
    log('💔 二人は倒れた…。でも、明日もクエストを続ければ、もっと強くなれる！（ページを再読み込みで再戦）');
  }
  btl.busy=false; lockBtns(false);
}

// ── 起動 ──
initBg3D();
render();
</script>
